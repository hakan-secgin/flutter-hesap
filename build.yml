name: Build Flet App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Flet
        run: pip install flet
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # Build for Web
      - name: Build Web
        run: flet build web
      
      # Build for Windows (Requires windows-latest, but we can do it in a separate job or just skip if ubuntu)
      # For simplicity, we build APK here
      - name: Build Android APK
        run: flet build apk
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build/
